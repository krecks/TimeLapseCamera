<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0d0c0a" />
<title>TIMELAPSECAM</title>
<style>
:root {
  --bg:        #0d0c0a;
  --surface:   #15130f;
  --surface2:  #1d1a14;
  --hair:      #2a2521;
  --hair-lit:  #3a342f;
  --text:      #e8e2d3;
  --dim:       #7a7268;
  --dimmer:    #4a443e;
  --accent:    #f7382c;
  --accent-dim:#5a1410;
  --ok:        #6cdb6c;
  --warn:      #ffc857;

  --mono: 'SF Mono', ui-monospace, 'JetBrains Mono', Menlo, Consolas, 'Liberation Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 14px;
  line-height: 1.5;
  font-variant-numeric: tabular-nums;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse at top, rgba(247, 56, 44, 0.04), transparent 60%),
    repeating-linear-gradient(transparent 0, transparent 3px, rgba(255, 255, 255, 0.005) 3px, rgba(255, 255, 255, 0.005) 4px);
}

button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
a { color: inherit; text-decoration: none; }

#loadingBar {
  position: fixed; top: 0; left: 0; right: 0;
  height: 1px; width: 0;
  background: var(--accent);
  z-index: 999;
  transition: width 0.18s ease-out, opacity 0.4s;
  box-shadow: 0 0 6px var(--accent);
}

.app {
  max-width: 880px;
  margin: 0 auto;
  padding: 0 24px;
  border-left: 1px solid var(--hair);
  border-right: 1px solid var(--hair);
  min-height: 100vh;
}

/* HEADER */
.head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 0 16px;
  border-bottom: 1px solid var(--hair);
}
.brand { display: flex; align-items: baseline; gap: 10px; }
.brand-grit {
  color: var(--accent);
  font-size: 1.4em;
  line-height: 1;
  transform: translateY(2px);
}
.brand-name {
  font-weight: 700;
  letter-spacing: 0.18em;
  font-size: 0.95rem;
}
.head-actions { display: flex; align-items: center; gap: 10px; }
.host {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.75rem;
  color: var(--dim);
  letter-spacing: 0.05em;
  padding: 4px 8px;
  border: 1px solid transparent;
  transition: border-color 0.2s, color 0.2s;
}
.host:hover { border-color: var(--hair-lit); color: var(--text); }
.host .arrow { color: var(--dim); }

/* DOTS / INDICATORS */
.dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--dimmer);
  vertical-align: middle;
}
.dot.live { background: var(--accent); animation: pulse 1.4s ease-in-out infinite; box-shadow: 0 0 8px rgba(247, 56, 44, 0.5); }
.dot.idle { background: var(--dimmer); }
.dot.ok   { background: var(--ok); }
.dot-host { width: 6px; height: 6px; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.35; }
}

@keyframes rise {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes flicker {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.9; }
}

/* SECTION SHELL */
.section {
  padding: 18px 0;
  border-bottom: 1px solid var(--hair);
}
.sec-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.sec-label {
  font-size: 0.7rem;
  letter-spacing: 0.22em;
  color: var(--dim);
  text-transform: uppercase;
}

.link {
  font-size: 0.75rem;
  color: var(--dim);
  letter-spacing: 0.1em;
  padding: 2px 6px;
  border: 1px solid transparent;
  text-transform: lowercase;
}
.link:hover { color: var(--text); border-color: var(--hair-lit); }

/* HERO */
.hero {
  display: grid;
  grid-template-columns: minmax(280px, 1fr) minmax(260px, 1fr);
  gap: 28px;
  padding: 28px 0;
  border-bottom: 1px solid var(--hair);
  align-items: start;
}
@media (max-width: 640px) {
  .hero { grid-template-columns: 1fr; gap: 20px; padding: 22px 0; }
  .app  { padding: 0 16px; }
}

.hero-state .sec-label { display: block; margin-bottom: 14px; }
.state-line {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 6px;
}
.state-line .dot { width: 14px; height: 14px; }
.state-word {
  font-size: 2.4rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  line-height: 1;
}
.state-word.running { color: var(--text); }
.state-word.stopped { color: var(--dim); }
.state-since {
  font-size: 0.78rem;
  color: var(--dim);
  letter-spacing: 0.05em;
  margin-bottom: 22px;
  margin-left: 28px;
}

.primary {
  width: 100%;
  height: 56px;
  border: 1px solid var(--hair-lit);
  background: var(--surface);
  color: var(--dim);
  font-size: 0.95rem;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  display: flex; align-items: center; justify-content: center;
  gap: 14px;
  transition: border-color 0.18s, color 0.18s, background 0.18s, transform 0.08s;
  position: relative;
  overflow: hidden;
}
.primary::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--dimmer);
  transition: background 0.18s;
}
.primary:hover:not(:disabled) {
  color: var(--text); border-color: var(--text);
}
.primary:hover:not(:disabled)::before { background: var(--text); }
.primary:active:not(:disabled) { transform: scale(0.98); }
.primary:disabled { opacity: 0.4; cursor: wait; }
.primary.is-running {
  color: var(--accent);
  border-color: var(--accent);
}
.primary.is-running::before { background: var(--accent); }
.primary.is-running:hover { background: rgba(247, 56, 44, 0.08); }
.primary-glyph { font-size: 0.8em; line-height: 1; }

/* PREVIEW */
.preview-frame {
  width: 100%;
  aspect-ratio: 16 / 10;
  background: #000;
  border: 1px solid var(--hair);
  position: relative;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.preview-frame img,
.preview-frame video {
  width: 100%; height: 100%; object-fit: contain;
  display: block;
}
.preview-empty {
  color: var(--dimmer);
  font-size: 0.75rem;
  letter-spacing: 0.1em;
  text-transform: lowercase;
}
.rec-overlay {
  position: absolute;
  inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px;
  background: linear-gradient(135deg, #0a0a08 0%, #14100e 100%);
}
.rec-overlay .badge {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 0.3em;
  color: var(--accent);
}
.rec-overlay .badge .dot { width: 10px; height: 10px; }
.rec-overlay .rec-time {
  font-size: 1.6rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  color: var(--text);
  animation: flicker 2s ease-in-out infinite;
}
.rec-overlay .rec-name {
  font-size: 0.7rem;
  color: var(--dim);
  letter-spacing: 0.05em;
}
.rec-overlay .rec-count {
  font-size: 0.72rem;
  color: var(--dim);
  letter-spacing: 0.08em;
  margin-top: 4px;
}
.preview-meta {
  margin-top: 10px;
  display: flex; align-items: center; justify-content: space-between;
  font-size: 0.78rem;
  gap: 12px;
}
.preview-name { color: var(--text); font-weight: 600; }
.preview-time { color: var(--dim); }
.preview-dl {
  font-size: 0.78rem;
  letter-spacing: 0.1em;
  color: var(--dim);
  padding: 3px 8px;
  border: 1px solid var(--hair-lit);
  white-space: nowrap;
}
.preview-dl:hover { color: var(--text); border-color: var(--text); }

/* TELEMETRY ROWS */
.tel { display: block; }
.tel-row {
  display: flex; align-items: baseline;
  padding: 7px 0;
  font-size: 0.88rem;
  animation: rise 360ms ease-out backwards;
  animation-delay: calc(var(--i, 0) * 35ms);
}
.tel-row .k {
  color: var(--dim);
  letter-spacing: 0.04em;
}
.tel-row .leader {
  flex: 1;
  border-bottom: 1px dotted var(--dimmer);
  transform: translateY(-4px);
  margin: 0 12px;
  min-width: 24px;
}
.tel-row .v {
  color: var(--text);
  font-weight: 600;
  text-align: right;
}
.tel-row.overdue .v { color: var(--accent); }
.tel-row.dim .v { color: var(--dim); }

/* BATTERY TICKS */
.bat-ticks {
  display: inline-flex;
  gap: 2px;
  margin-right: 10px;
  vertical-align: middle;
}
.bat-ticks i {
  width: 8px; height: 10px;
  background: var(--dimmer);
  display: inline-block;
}
.bat-ticks i.on  { background: var(--text); }
.bat-ticks i.warn{ background: var(--warn); }
.bat-ticks i.crit{ background: var(--accent); }

/* FILE TREE */
.tree { font-size: 0.85rem; }
.tree-row {
  display: flex; align-items: center;
  padding: 5px 4px;
  position: relative;
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: background 0.12s, border-color 0.12s;
}
.tree-row:hover { background: var(--surface); border-left-color: var(--accent-dim); }
.tree-row.is-file { cursor: default; }
.tree-row .indent { display: inline-block; }
.tree-row .chev {
  display: inline-block;
  width: 14px;
  color: var(--dim);
  font-size: 0.7rem;
  transition: transform 0.16s;
  text-align: center;
}
.tree-row .chev.open { transform: rotate(90deg); }
.tree-row .glyph {
  display: inline-block;
  width: 18px;
  text-align: center;
  color: var(--dim);
  margin-right: 4px;
}
.tree-row.is-folder .glyph { color: var(--accent); }
.tree-row .name {
  flex: 1;
  word-break: break-all;
  color: var(--text);
}
.tree-row.is-folder .name { color: var(--text); }
.tree-row .actions {
  display: flex; gap: 4px;
  flex-shrink: 0;
  opacity: 0;
  transition: opacity 0.15s;
}
.tree-row:hover .actions { opacity: 1; }
@media (max-width: 640px) { .tree-row .actions { opacity: 1; } }
.act {
  font-size: 0.7rem;
  letter-spacing: 0.08em;
  color: var(--dim);
  padding: 2px 7px;
  border: 1px solid transparent;
  text-transform: lowercase;
}
.act:hover { color: var(--text); border-color: var(--hair-lit); }
.act.danger:hover { color: var(--accent); border-color: var(--accent); }
.tree-empty {
  color: var(--dimmer);
  font-size: 0.78rem;
  padding: 4px 0 4px 22px;
  font-style: italic;
}

/* PARAMETERS */
details.params {
  padding: 18px 0;
}
details.params > summary {
  list-style: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 0;
}
details.params > summary::-webkit-details-marker { display: none; }
details.params .caret {
  color: var(--dim);
  transition: transform 0.18s;
  font-size: 0.7rem;
}
details.params[open] .caret { transform: rotate(180deg); color: var(--text); }
details.params[open] > summary { margin-bottom: 12px; }

/* FOOTER */
.foot {
  display: flex; gap: 8px;
  padding: 16px 0 24px;
  font-size: 0.7rem;
  color: var(--dimmer);
  letter-spacing: 0.1em;
}
.foot a:hover { color: var(--text); }

/* dim helper */
.dim { color: var(--dim); }
</style>
</head>
<body>

<div id="loadingBar"></div>

<div class="app">

  <header class="head">
    <div class="brand">
      <span class="brand-grit">╲</span>
      <span class="brand-name">TIMELAPSECAM</span>
    </div>
    <div class="head-actions">
      <button class="link" onclick="btRefresh(false)">↻ refresh</button>
      <a class="host" href="/rest" target="_blank">
        <span class="dot dot-host" id="hostDot"></span>
        <span id="hostText">connecting…</span>
        <span class="arrow">↗</span>
      </a>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-state">
      <div class="sec-label">state</div>
      <div class="state-line">
        <span class="dot dot-state idle" id="stateDot"></span>
        <span class="state-word stopped" id="stateWord">— — —</span>
      </div>
      <div class="state-since" id="stateSince">awaiting telemetry</div>
      <button class="primary" id="btToggle" disabled onclick="btToggle()">
        <span class="primary-glyph">…</span>
        <span class="primary-label">CONNECTING</span>
      </button>
    </div>

    <div class="hero-preview">
      <div class="preview-frame" id="previewFrame">
        <div class="preview-empty">no frame yet</div>
      </div>
      <div class="preview-meta" id="previewMeta">
        <span class="preview-name dim">—</span>
        <span class="preview-time dim"></span>
      </div>
    </div>
  </section>

  <!-- TELEMETRY -->
  <section class="section">
    <header class="sec-head"><span class="sec-label">telemetry</span></header>
    <div class="tel">
      <div class="tel-row" style="--i:0">
        <span class="k">battery</span>
        <span class="leader"></span>
        <span class="v">
          <span class="bat-ticks" id="batTicks"><i></i><i></i><i></i><i></i><i></i></span>
          <span id="batPct">— %</span>
        </span>
      </div>
      <div class="tel-row" style="--i:1">
        <span class="k">files captured</span>
        <span class="leader"></span>
        <span class="v" id="rowCount">—</span>
      </div>
      <div class="tel-row" style="--i:2">
        <span class="k">interval</span>
        <span class="leader"></span>
        <span class="v" id="rowInterval">—</span>
      </div>
      <div class="tel-row" style="--i:3">
        <span class="k">mode</span>
        <span class="leader"></span>
        <span class="v" id="rowMode">—</span>
      </div>
      <div class="tel-row" style="--i:4" id="rowNext">
        <span class="k">next image</span>
        <span class="leader"></span>
        <span class="v" id="rowNextVal">—</span>
      </div>
    </div>
  </section>

  <!-- FILES -->
  <section class="section">
    <header class="sec-head">
      <span class="sec-label">files</span>
      <button class="link" onclick="loadBrowser()">↻ refresh</button>
    </header>
    <div id="fileTree" class="tree"><div class="tree-empty">loading…</div></div>
  </section>

  <!-- PARAMETERS -->
  <details class="section params" id="paramsBox">
    <summary>
      <span class="sec-label">parameters</span>
      <span class="caret">▾</span>
    </summary>
    <div class="tel" id="paramsBody"><div class="tree-empty">expand to load</div></div>
  </details>

  <footer class="foot">
    <a href="/rest" target="_blank">/rest</a>
    <span>•</span>
    <span id="footMeta">timelapsecam</span>
  </footer>

</div>

<script>
// ---- State ----
var g_intervalMs = 0;
var g_mode = '';
var g_state = '';
var g_lastImgTs = 0;
var g_pending = 0;
var g_paramsLoaded = false;
var g_expanded = {};
var g_stateChangedAt = 0;
var g_recordingStartTs = 0;
var g_recTimerId = null;
var g_recName = '';
var g_recAnchor = 0;
var g_serverStartedAt = 0;

// ---- Helpers ----
function setLoading(on) {
  var bar = document.getElementById('loadingBar');
  bar.style.width = on ? '78%' : '0';
  bar.style.opacity = on ? '1' : '0';
}

function loadRest(url, cb, errCb) {
  g_pending++;
  setLoading(true);
  var xhr = new XMLHttpRequest();
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    g_pending = Math.max(0, g_pending - 1);
    if (g_pending === 0) setLoading(false);
    if (xhr.status >= 200 && xhr.status < 300) {
      if (cb) cb(xhr.responseText.trim());
    } else if (errCb) {
      errCb(xhr.status);
    }
  };
  xhr.open('GET', url, true);
  xhr.send();
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function parseKv(d) {
  var out = {};
  d.split('\n').forEach(function(l) {
    l = l.replace(/\r$/, '');
    var pos = l.indexOf('=');
    if (pos === -1) return;
    out[l.substring(0, pos)] = l.substring(pos + 1);
  });
  return out;
}

function fmtTime(d) {
  function p(n) { return (n < 10 ? '0' : '') + n; }
  return p(d.getHours()) + ':' + p(d.getMinutes()) + ':' + p(d.getSeconds());
}

function fmtDuration(ms) {
  var s = Math.max(0, Math.floor(ms / 1000));
  var h = Math.floor(s / 3600);
  var m = Math.floor((s % 3600) / 60);
  var sec = s % 60;
  function p(n) { return (n < 10 ? '0' : '') + n; }
  if (h > 0) return p(h) + ':' + p(m) + ':' + p(sec);
  return p(m) + ':' + p(sec);
}

// ---- Toggle ----
function btToggle() {
  var btn = document.getElementById('btToggle');
  if (g_state === 'running') {
    if (!confirm('Stop recording?')) return;
    btn.disabled = true;
    loadRest('/1/ctrl/stop', function(d) {
      if (d !== 'ok') alert('Stop failed: ' + d);
      btRefresh(true);
      setTimeout(function(){ btRefresh(false); }, 800);
      setTimeout(function(){ btRefresh(false); }, 2500);
    });
  } else {
    btn.disabled = true;
    loadRest('/1/ctrl/start', function(d) {
      if (d !== 'ok') alert('Start failed: ' + d);
      btRefresh(true);
      setTimeout(function(){ btRefresh(false); }, 800);
      setTimeout(function(){ btRefresh(false); }, 2500);
    });
  }
}

// ---- Apply ----
function applyState(d) {
  var prev = g_state;
  g_state = d;

  var dot = document.getElementById('stateDot');
  var word = document.getElementById('stateWord');
  var since = document.getElementById('stateSince');
  var btn = document.getElementById('btToggle');
  var hostDot = document.getElementById('hostDot');

  hostDot.className = 'dot dot-host ok';

  if (d === 'running') {
    dot.className = 'dot live';
    word.className = 'state-word running';
    word.textContent = 'RUNNING';
    btn.disabled = false;
    btn.className = 'primary is-running';
    btn.innerHTML = '<span class="primary-glyph">■</span><span class="primary-label">STOP RECORDING</span>';
    if (prev !== 'running') {
      g_stateChangedAt = Date.now();
      g_recordingStartTs = Date.now();
    }
    since.textContent = 'since ' + fmtTime(new Date(g_stateChangedAt));
  } else {
    dot.className = 'dot idle';
    word.className = 'state-word stopped';
    word.textContent = 'STOPPED';
    btn.disabled = false;
    btn.className = 'primary';
    btn.innerHTML = '<span class="primary-glyph">▶</span><span class="primary-label">START RECORDING</span>';
    if (prev === 'running' && prev !== '') {
      g_stateChangedAt = Date.now();
    } else if (g_stateChangedAt === 0) {
      g_stateChangedAt = Date.now();
    }
    since.textContent = prev ? 'since ' + fmtTime(new Date(g_stateChangedAt)) : 'idle';
    g_recordingStartTs = 0;
  }
}

function applyBattery(pct) {
  document.getElementById('batPct').textContent = pct.toFixed(1) + '%';
  var ticks = document.getElementById('batTicks').children;
  var filled = Math.round(pct / 20);
  var cls = pct > 50 ? 'on' : pct > 20 ? 'warn' : 'crit';
  for (var i = 0; i < ticks.length; i++) {
    ticks[i].className = i < filled ? cls : '';
  }
}

function applyLastImg(name, ts, rel) {
  var frame = document.getElementById('previewFrame');
  var meta  = document.getElementById('previewMeta');

  if (!name) {
    frame.innerHTML = '<div class="preview-empty">no frame yet</div>';
    meta.innerHTML = '<span class="preview-name dim">—</span><span class="preview-time dim"></span>';
    document.getElementById('rowNext').style.display = 'none';
    g_lastImgTs = 0;
    stopRecTimer();
    return;
  }

  var url = '/1/img/' + rel;
  var dateStr = new Date(ts).toLocaleString();
  var isImg = /\.(jpg|jpeg|png)$/i.test(name);
  var isVid = /\.mp4$/i.test(name);
  var changed = ts !== g_lastImgTs;
  var recording = isVid && g_state === 'running';
  g_lastImgTs = ts;

  if (recording) {
    var nameChanged = g_recName !== name;
    var anchor = g_serverStartedAt || g_stateChangedAt || Date.now();
    var anchorChanged = g_recAnchor !== anchor;
    if (nameChanged || anchorChanged) {
      g_recName = name;
      g_recAnchor = anchor;
      frame.innerHTML = '<div class="rec-overlay">' +
        '<div class="badge"><span class="dot live"></span><span>REC</span></div>' +
        '<div class="rec-time" id="recTime">00:00</div>' +
        '<div class="rec-name">' + esc(name) + '</div>' +
        '<div class="rec-count" id="recCount"></div>' +
      '</div>';
      startRecTimer(g_recAnchor);
    }
  } else if (isImg) {
    var src = changed ? url + '?t=' + ts : url;
    if (!changed && frame.querySelector('img')) {
      // skip rebuild
    } else {
      frame.innerHTML = '<img src="' + esc(src) + '" alt="last image">';
    }
    stopRecTimer();
  } else if (isVid) {
    if (changed || !frame.querySelector('video')) {
      frame.innerHTML = '<video src="' + esc(url) + '" controls preload="metadata"></video>';
    }
    stopRecTimer();
  }

  // META line
  var dlHtml = recording
    ? '<span class="preview-time dim">recording…</span>'
    : '<a class="preview-dl" href="' + esc(url) + '" download="' + esc(name) + '">↓ download</a>';
  meta.innerHTML =
    '<span class="preview-name">' + esc(name) + '</span>' +
    '<span class="preview-time">' + esc(dateStr) + '</span>' +
    dlHtml;

  // NEXT IMAGE row
  var nextRow = document.getElementById('rowNext');
  if (g_intervalMs > 0 && g_mode === 'IMAGE_TIME_LAPSE') {
    nextRow.style.display = '';
    var nextTs = ts + g_intervalMs;
    var diffSec = (Date.now() - nextTs) / 1000;
    var inSec = Math.round(-diffSec);
    var nextEl = document.getElementById('rowNextVal');
    nextRow.classList.toggle('overdue', diffSec > 10);
    nextEl.textContent = diffSec > 10
      ? 'overdue ' + Math.round(diffSec) + 's'
      : 'in ' + inSec + 's';
  } else {
    nextRow.style.display = 'none';
  }
}

function startRecTimer(ts) {
  stopRecTimer();
  g_recordingStartTs = ts;
  function tick() {
    var el = document.getElementById('recTime');
    if (!el) { stopRecTimer(); return; }
    el.textContent = fmtDuration(Date.now() - g_recordingStartTs);
  }
  tick();
  g_recTimerId = setInterval(tick, 1000);
}
function stopRecTimer() {
  if (g_recTimerId) { clearInterval(g_recTimerId); g_recTimerId = null; }
  g_recName = '';
  g_recAnchor = 0;
}

function applyParams(config) {
  g_intervalMs = parseInt(config['pref_capture_rate']) || 0;
  g_mode = config['pref_rec_mode'] || '';
  document.getElementById('rowInterval').textContent = (g_intervalMs / 1000) + ' s';
  document.getElementById('rowMode').textContent = g_mode || '—';

  var keys = Object.keys(config).sort();
  var html = keys.map(function(k, i) {
    return '<div class="tel-row" style="--i:' + Math.min(i, 12) + '">' +
      '<span class="k">' + esc(k) + '</span>' +
      '<span class="leader"></span>' +
      '<span class="v">' + esc(config[k]) + '</span>' +
    '</div>';
  }).join('');
  document.getElementById('paramsBody').innerHTML = html || '<div class="tree-empty">no parameters</div>';
}

// ---- Refresh ----
function btRefresh(forceParams) {
  loadRest('/1/dashboard', function(d) {
    var cfg = parseKv(d);
    g_serverStartedAt = parseInt(cfg.started_ts) || 0;
    applyState(cfg.state || 'unknown');
    applyBattery(parseFloat(cfg.battery) || 0);
    var count = cfg.imgcount || '0';
    document.getElementById('rowCount').textContent = count;
    var rc = document.getElementById('recCount');
    if (rc) rc.textContent = count + ' file' + (count === '1' ? '' : 's') + ' captured';

    g_intervalMs = parseInt(cfg.interval_ms) || g_intervalMs;
    g_mode = cfg.mode || g_mode;
    document.getElementById('rowInterval').textContent = (g_intervalMs / 1000) + ' s';
    document.getElementById('rowMode').textContent = g_mode || '—';

    var ts = parseInt(cfg.lastimg_ts) || 0;
    applyLastImg(cfg.lastimg_name || '', ts, cfg.lastimg_path || '');

    document.getElementById('hostText').textContent = location.host;
    document.getElementById('footMeta').textContent = 'rec ' + (cfg.imgcount || '0') + ' • ' + (g_mode || '');
  }, function(code) {
    document.getElementById('hostDot').className = 'dot dot-host';
    document.getElementById('hostText').textContent = 'offline ' + code;
  });

  if (forceParams || (document.getElementById('paramsBox').open && !g_paramsLoaded)) {
    loadRest('/1/ctrl/param', function(d) {
      applyParams(parseKv(d));
      g_paramsLoaded = true;
    });
  }
}

// Lazy-load params on first expand
document.getElementById('paramsBox').addEventListener('toggle', function(e) {
  if (this.open && !g_paramsLoaded) {
    loadRest('/1/ctrl/param', function(d) {
      applyParams(parseKv(d));
      g_paramsLoaded = true;
    });
  }
});

// ---- File browser ----
function isMedia(name) {
  return /\.(jpg|jpeg|png|mp4)$/i.test(name);
}
function fileGlyph(name) {
  if (/\.mp4$/i.test(name)) return '▣';
  if (/\.(jpg|jpeg|png)$/i.test(name)) return '□';
  return '·';
}

function loadBrowser() {
  var tree = document.getElementById('fileTree');
  tree.innerHTML = '<div class="tree-empty">loading…</div>';
  loadRest('/1/img/list', function(d) {
    var items = d.split('\n').map(function(s){ return s.trim(); }).filter(Boolean);
    tree.innerHTML = '';
    if (!items.length) {
      tree.innerHTML = '<div class="tree-empty">no recordings</div>';
      return;
    }
    items.forEach(function(name) { renderFolder(tree, name, name, 0); });
  }, function(code) {
    tree.innerHTML = '<div class="tree-empty">error: ' + code + '</div>';
  });
}

function renderFolder(parent, path, name, depth) {
  var row = document.createElement('div');
  row.className = 'tree-row is-folder';
  row.style.paddingLeft = (4 + depth * 18) + 'px';

  var chev = document.createElement('span');
  chev.className = 'chev';
  chev.textContent = '▸';
  row.appendChild(chev);

  var glyph = document.createElement('span');
  glyph.className = 'glyph';
  glyph.textContent = '/';
  row.appendChild(glyph);

  var label = document.createElement('span');
  label.className = 'name';
  label.textContent = name;
  row.appendChild(label);

  // Actions: refresh + delete
  var actions = document.createElement('span');
  actions.className = 'actions';

  var rfBtn = document.createElement('button');
  rfBtn.className = 'act';
  rfBtn.textContent = '↻';
  rfBtn.title = 'reload contents';
  rfBtn.onclick = function(e) { e.stopPropagation(); reloadFolder(); };
  actions.appendChild(rfBtn);

  var delBtn = document.createElement('button');
  delBtn.className = 'act danger';
  delBtn.textContent = '✕';
  delBtn.title = 'delete folder';
  delBtn.onclick = function(e) {
    e.stopPropagation();
    if (!confirm('Delete folder "' + name + '" and ALL contents?')) return;
    if (!confirm('This cannot be undone. Really delete "' + name + '"?')) return;
    var xhr = new XMLHttpRequest();
    xhr.onreadystatechange = function() {
      if (xhr.readyState !== 4) return;
      if (xhr.status >= 200 && xhr.status < 300) {
        delete g_expanded[path];
        var sib = row.nextSibling;
        row.parentNode.removeChild(row);
        if (sib && sib.dataset && sib.dataset.kidsOf === path) sib.parentNode.removeChild(sib);
      } else {
        alert('Delete failed: ' + xhr.responseText);
      }
    };
    xhr.open('DELETE', '/1/img/' + path + '/', true);
    xhr.send();
  };
  actions.appendChild(delBtn);
  row.appendChild(actions);

  parent.appendChild(row);

  var kids = document.createElement('div');
  kids.dataset.kidsOf = path;
  kids.style.display = 'none';
  parent.appendChild(kids);

  var loaded = false;

  function load() {
    loaded = true;
    kids.innerHTML = '<div class="tree-empty" style="padding-left:' + (4 + (depth+1)*18) + 'px">loading…</div>';
    loadRest('/1/img/' + path + '/list', function(d) {
      kids.innerHTML = '';
      var entries = d.split('\n').map(function(s){ return s.trim(); }).filter(Boolean);
      if (!entries.length) {
        kids.innerHTML = '<div class="tree-empty" style="padding-left:' + (4 + (depth+1)*18) + 'px">empty</div>';
        return;
      }
      entries.forEach(function(entry) {
        if (isMedia(entry)) renderFile(kids, path + '/' + entry, entry, depth + 1);
        else renderFolder(kids, path + '/' + entry, entry, depth + 1);
      });
    });
  }

  function reloadFolder() {
    loaded = false;
    kids.innerHTML = '';
    if (kids.style.display !== 'none') load();
  }

  function expand() {
    kids.style.display = '';
    chev.classList.add('open');
    g_expanded[path] = true;
    if (!loaded) load();
  }
  function collapse() {
    kids.style.display = 'none';
    chev.classList.remove('open');
    delete g_expanded[path];
  }

  row.onclick = function() {
    if (kids.style.display === 'none') expand(); else collapse();
  };

  if (g_expanded[path]) expand();
}

function renderFile(parent, path, name, depth) {
  var url  = '/1/img/' + path;
  var isVid = /\.mp4$/i.test(name);
  var isImg = /\.(jpg|jpeg|png)$/i.test(name);

  var row = document.createElement('div');
  row.className = 'tree-row is-file';
  row.style.paddingLeft = (4 + depth * 18) + 'px';

  var chev = document.createElement('span');
  chev.className = 'chev';
  chev.textContent = '';
  row.appendChild(chev);

  var glyph = document.createElement('span');
  glyph.className = 'glyph';
  glyph.textContent = fileGlyph(name);
  row.appendChild(glyph);

  var label = document.createElement('span');
  label.className = 'name';
  label.textContent = name;
  row.appendChild(label);

  var actions = document.createElement('span');
  actions.className = 'actions';

  if (isImg || isVid) {
    var prev = document.createElement('button');
    prev.className = 'act';
    prev.textContent = 'view';
    prev.onclick = function(e) {
      e.stopPropagation();
      var frame = document.getElementById('previewFrame');
      var meta  = document.getElementById('previewMeta');
      if (isImg) {
        frame.innerHTML = '<img src="' + esc(url) + '" alt="' + esc(name) + '">';
      } else {
        frame.innerHTML = '<video src="' + esc(url) + '" controls preload="metadata"></video>';
      }
      meta.innerHTML =
        '<span class="preview-name">' + esc(name) + '</span>' +
        '<span class="preview-time">archived</span>' +
        '<a class="preview-dl" href="' + esc(url) + '" download="' + esc(name) + '">↓ download</a>';
      stopRecTimer();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };
    actions.appendChild(prev);
  }

  var dl = document.createElement('a');
  dl.className = 'act';
  dl.href = url;
  dl.download = name;
  dl.textContent = '↓';
  dl.onclick = function(e) { e.stopPropagation(); };
  actions.appendChild(dl);

  var del = document.createElement('button');
  del.className = 'act danger';
  del.textContent = '✕';
  del.onclick = function(e) {
    e.stopPropagation();
    if (!confirm('Delete ' + name + '?')) return;
    var xhr = new XMLHttpRequest();
    xhr.onreadystatechange = function() {
      if (xhr.readyState !== 4) return;
      if (xhr.status >= 200 && xhr.status < 300) {
        row.parentNode.removeChild(row);
      } else {
        alert('Delete failed: ' + xhr.responseText);
      }
    };
    xhr.open('DELETE', url, true);
    xhr.send();
  };
  actions.appendChild(del);

  row.appendChild(actions);
  parent.appendChild(row);
}

// ---- Init ----
btRefresh(false);
loadBrowser();
</script>
</body>
</html>
